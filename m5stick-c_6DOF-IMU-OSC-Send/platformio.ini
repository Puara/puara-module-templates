; PlatformIO Project Configuration File
; This file defines the build, upload, and library options for the project.
; For detailed documentation, visit: https://docs.platformio.org/page/projectconf.html

[platformio]
description = Puara module M5StickC example project

[common]
; Define the platform and framework used for this project
; This platform does not compile with pioarduino, so we use the espressif32 platform directly.
platform = espressif32
framework = arduino

lib_deps =
    https://github.com/Puara/puara-module.git#1.0.1
    https://github.com/cnmat/OSC#3.5.8
    https://github.com/m5stack/M5StickC.git

board_build.partitions = min_spiffs_no_OTA.csv
monitor_speed = 115200
monitor_echo = yes
monitor_filters = default esp32_exception_decoder

; Filesystem options:
; Uncomment one of the following lines to select the filesystem:
board_build.filesystem = littlefs ; Default: LittleFS
;board_build.filesystem = spiffs  ; Use SPIFFS instead (requires -DPUARA_SPIFFS flag)

[env:template]
extends = common
board = m5stick-c 
board_build.variant = m5stack_stickc
build_flags =
    -DBOARD_HAS_PSRAM
    ;-DPUARA_SPIFFS ; indicate the usage of SPIFFS to compiler
    -mfix-esp32-psram-cache-issue ; if using esp32-"c3" boards, comment out this line
    -std=gnu++2a
build_unflags = -std=c++11 -std=c++14 -std=c++17 -std=gnu++11 -std=gnu++14 -std=gnu++17